server {
    listen 80;
    listen [::]:80;
    server_name _;                       # دامنه‌ات را اینجا بگذار، یا _ برای IP

    root /var/www/nexametrica;           # خروجی build اینجا کپی می‌شود
    index index.html;

    # API بک‌اند (FastAPI/uvicorn روی 127.0.0.1:8000)
    location /api/ {
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 120s;
    }

    # SPA: همه‌ی مسیرها به index.html (ناوبری مبتنی بر state است)
    location / {
        try_files $uri /index.html;
    }

    # کش طولانی برای دارایی‌های هش‌دار (js/css/فونت)
    location ~* \.(?:js|css|woff2?|svg|png|jpe?g|ico)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    gzip on;
    gzip_comp_level 5;
    gzip_types text/css application/javascript image/svg+xml application/json font/woff2;
}
